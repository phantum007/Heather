{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Abacus{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20256%20256%27%3E%3Crect%20width%3D%27256%27%20height%3D%27256%27%20rx%3D%2756%27%20fill%3D%27%230F766E%27/%3E%3Crect%20x%3D%2746%27%20y%3D%2740%27%20width%3D%27164%27%20height%3D%27176%27%20rx%3D%2728%27%20fill%3D%27rgba%28255%2C255%2C255%2C0.14%29%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.46%29%27%20stroke-width%3D%278%27/%3E%3Crect%20x%3D%2780%27%20y%3D%2776%27%20width%3D%2796%27%20height%3D%2710%27%20rx%3D%275%27%20fill%3D%27%23E6F6FF%27/%3E%3Crect%20x%3D%2780%27%20y%3D%27118%27%20width%3D%2796%27%20height%3D%2710%27%20rx%3D%275%27%20fill%3D%27%23E6F6FF%27/%3E%3Crect%20x%3D%2780%27%20y%3D%27160%27%20width%3D%2796%27%20height%3D%2710%27%20rx%3D%275%27%20fill%3D%27%23E6F6FF%27/%3E%3Ccircle%20cx%3D%27102%27%20cy%3D%2781%27%20r%3D%2715%27%20fill%3D%27%23F97316%27/%3E%3Ccircle%20cx%3D%27154%27%20cy%3D%2781%27%20r%3D%2715%27%20fill%3D%27%2338BDF8%27/%3E%3Ccircle%20cx%3D%27128%27%20cy%3D%27123%27%20r%3D%2715%27%20fill%3D%27%23FB7185%27/%3E%3Ccircle%20cx%3D%27102%27%20cy%3D%27165%27%20r%3D%2715%27%20fill%3D%27%2338BDF8%27/%3E%3Ccircle%20cx%3D%27154%27%20cy%3D%27165%27%20r%3D%2715%27%20fill%3D%27%23F97316%27/%3E%3Cpath%20d%3D%27M96%20198L128%2058L160%20198%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.92%29%27%20stroke-width%3D%2710%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3Cpath%20d%3D%27M108%20146H148%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.92%29%27%20stroke-width%3D%2710%27%20stroke-linecap%3D%27round%27/%3E%3C/svg%3E">
  <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20256%20256%27%3E%3Crect%20width%3D%27256%27%20height%3D%27256%27%20rx%3D%2756%27%20fill%3D%27%230F766E%27/%3E%3Crect%20x%3D%2746%27%20y%3D%2740%27%20width%3D%27164%27%20height%3D%27176%27%20rx%3D%2728%27%20fill%3D%27rgba%28255%2C255%2C255%2C0.14%29%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.46%29%27%20stroke-width%3D%278%27/%3E%3Crect%20x%3D%2780%27%20y%3D%2776%27%20width%3D%2796%27%20height%3D%2710%27%20rx%3D%275%27%20fill%3D%27%23E6F6FF%27/%3E%3Crect%20x%3D%2780%27%20y%3D%27118%27%20width%3D%2796%27%20height%3D%2710%27%20rx%3D%275%27%20fill%3D%27%23E6F6FF%27/%3E%3Crect%20x%3D%2780%27%20y%3D%27160%27%20width%3D%2796%27%20height%3D%2710%27%20rx%3D%275%27%20fill%3D%27%23E6F6FF%27/%3E%3Ccircle%20cx%3D%27102%27%20cy%3D%2781%27%20r%3D%2715%27%20fill%3D%27%23F97316%27/%3E%3Ccircle%20cx%3D%27154%27%20cy%3D%2781%27%20r%3D%2715%27%20fill%3D%27%2338BDF8%27/%3E%3Ccircle%20cx%3D%27128%27%20cy%3D%27123%27%20r%3D%2715%27%20fill%3D%27%23FB7185%27/%3E%3Ccircle%20cx%3D%27102%27%20cy%3D%27165%27%20r%3D%2715%27%20fill%3D%27%2338BDF8%27/%3E%3Ccircle%20cx%3D%27154%27%20cy%3D%27165%27%20r%3D%2715%27%20fill%3D%27%23F97316%27/%3E%3Cpath%20d%3D%27M96%20198L128%2058L160%20198%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.92%29%27%20stroke-width%3D%2710%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3Cpath%20d%3D%27M108%20146H148%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.92%29%27%20stroke-width%3D%2710%27%20stroke-linecap%3D%27round%27/%3E%3C/svg%3E">
  <style>
    :root {
      color: #0f172a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(87, 135, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(12, 179, 154, 0.12), transparent 24%),
        linear-gradient(180deg, #eef3ff 0%, #f7f9fc 46%, #f4f6fb 100%);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: transparent; }
    a { color: inherit; text-decoration: none; }
    .login-shell, .teacher-shell { min-height: 100vh; }
    .login-shell { display: grid; place-items: center; padding: 32px; }
    .login-card, .card, .topbar { border: 1px solid rgba(255,255,255,0.75); background: rgba(255,255,255,0.9); box-shadow: 0 20px 50px rgba(15, 23, 42, 0.06); }
    .login-card { width: min(100%, 480px); border-radius: 28px; padding: 32px; }
    .teacher-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); }
    .teacher-shell.app-shell { height: 100vh; min-height: 100vh; overflow: hidden; }
    .teacher-sidebar { min-height: 100vh; padding: 32px 24px; border-right: 1px solid rgba(226,232,240,0.8); background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); box-shadow: 18px 0 50px rgba(15, 23, 42, 0.04); }
    .app-shell .teacher-sidebar { height: 100vh; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .teacher-main { padding: 24px 28px 40px; }
    .app-shell .teacher-main { height: 100vh; min-height: 0; overflow: hidden; display: flex; flex-direction: column; padding: 24px 28px; }
    .main-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 18px 0 40px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; border-radius: 28px; padding: 20px 24px; position: relative; z-index: 4; background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.94) 100%); box-shadow: 0 22px 46px rgba(15, 23, 42, 0.1); }
    .brand { display:flex; gap:16px; align-items:center; }
    .brand-mark, .avatar { display:flex; align-items:center; justify-content:center; font-weight:700; }
    .brand-mark { width:56px; height:56px; }
    .brand-logo { width:56px; height:56px; display:block; filter: drop-shadow(0 10px 20px rgba(15, 23, 42, 0.18)); }
    .login-brand { display:flex; align-items:center; gap:16px; margin-bottom:18px; }
    .login-brand .brand-logo { width:64px; height:64px; }
    .avatar { width:44px; height:44px; border-radius:16px; background:#0f172a; color:#fff; text-transform:uppercase; overflow:hidden; }
    .avatar.small { width:36px; height:36px; border-radius:14px; font-size:14px; }
    .avatar-image { width:100%; height:100%; object-fit:cover; display:block; }
    .brand-eyebrow, .eyebrow { margin:0; font-size:12px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#0284c7; }
    .eyebrow.muted { color:#cbd5e1; }
    .brand h1, .page-title, .card h3, .login-card h1 { margin:6px 0 0; }
    .page-title { font-size:32px; }
    .profile-card { display:flex; gap:12px; align-items:center; margin:32px 0; padding:16px; border-radius:24px; background:#f8fafc; border:1px solid #e2e8f0; }
    .profile-name { margin:0; font-weight:700; }
    .profile-email { margin:4px 0 0; color:#64748b; font-size:13px; }
    .nav-list { display:grid; gap:8px; margin:20px 0 32px; }
    .app-shell .nav-list { flex: 1; align-content: start; min-height: 0; overflow-y: auto; padding-right: 4px; }
    .nav-list a { padding:14px 16px; border-radius:18px; color:#475569; font-weight:600; }
    .nav-list a.active, .nav-list a:hover { color:#fff; background: linear-gradient(90deg, #2563eb, #06b6d4); }
    .sidebar-topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .sidebar-toggle { width:44px; height:44px; border-radius:14px; border:1px solid #cbd5e1; background:#fff; color:#334155; font-size:22px; line-height:1; cursor:pointer; flex-shrink:0; position:relative; z-index:6; }
    .sidebar-footer { margin-top:auto; padding-top:12px; }
    .app-shell.sidebar-collapsed { grid-template-columns: 96px minmax(0, 1fr); }
    .app-shell.sidebar-collapsed .brand h1,
    .app-shell.sidebar-collapsed .profile-card > div:last-child { display:none; }
    .app-shell.sidebar-collapsed .profile-card,
    .app-shell.sidebar-collapsed .brand { justify-content:center; }
    .app-shell.sidebar-collapsed .brand { gap:0; }
    .app-shell.sidebar-collapsed .sidebar-topbar { justify-content:center; position:sticky; top:0; padding-bottom:12px; background:rgba(255,255,255,0.96); z-index:5; }
    .app-shell.sidebar-collapsed .sidebar-topbar .brand { display:none; }
    .app-shell.sidebar-collapsed .sidebar-toggle { margin:0 auto; display:inline-flex; align-items:center; justify-content:center; }
    .app-shell.sidebar-collapsed .nav-list a,
    .app-shell.sidebar-collapsed .sidebar-footer .button { padding-left:10px; padding-right:10px; text-align:center; justify-content:center; }
    .app-shell.sidebar-collapsed .nav-list a .nav-label,
    .app-shell.sidebar-collapsed .sidebar-footer .button .button-label { display:none; }
    .app-shell.sidebar-collapsed .nav-list a::after,
    .app-shell.sidebar-collapsed .sidebar-footer .button::after {
      content: attr(data-short);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .status-pill, .badge { display:inline-flex; align-items:center; justify-content:center; border-radius:999px; padding:10px 14px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.18em; }
    .status-pill { background:#ecfdf5; color:#047857; }
    .badge { background:#e0f2fe; color:#0369a1; }
    .hero { margin-top:20px; padding:24px; border-radius:28px; color:#fff; background: linear-gradient(90deg, #020617, #1d4ed8, #155e75); display:flex; justify-content:space-between; align-items:center; gap:20px; }
    .hero-copy { margin:10px 0 0; max-width:720px; color:#e2e8f0; }
    .hero-actions { display:flex; gap:12px; flex-wrap:wrap; }
    .grid { display:grid; gap:20px; margin-top:24px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .compact-grid { margin-top:20px; }
    .assignment-filter-grid { grid-template-columns:repeat(3, minmax(0, 1fr)); }
    .card { border-radius:28px; padding:24px; }
    .card-subtitle, .stat-meta, .subcopy { color:#64748b; }
    .stat-label { margin:0; font-size:12px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:#94a3b8; }
    .stat-value { margin:16px 0 8px; font-size:42px; font-weight:700; }
    .action-title, .list-title { font-size:18px; font-weight:700; color:#0f172a; margin:0; }
    .action-card { display:block; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .action-card:hover { transform: translateY(-2px); }
    .action-card-active { border-color:#93c5fd; background:linear-gradient(180deg, #ffffff 0%, #eff6ff 100%); box-shadow: 0 18px 32px rgba(59, 130, 246, 0.12); }
    .stack, .stack-lg { display:grid; gap:16px; }
    .stack-lg { gap:20px; }
    .toolbar { display:flex; gap:12px; justify-content:space-between; align-items:center; }
    .toolbar-actions { display:flex; gap:12px; align-items:center; }
    .stack-on-mobile { align-items:stretch; }
    .onboard-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:16px; margin-top:20px; }
    .onboard-actions { display:flex; align-items:end; }
    .field { display:grid; gap:8px; font-weight:600; }
    .field-note { font-size:12px; color:#64748b; font-weight:500; }
    .field-inline-note { font-size:12px; color:#64748b; font-weight:600; }
    .input { width:100%; padding:14px 16px; border-radius:18px; border:1px solid #cbd5e1; background:#f8fafc; font: inherit; }
    .button { display:inline-flex; align-items:center; justify-content:center; border-radius:18px; padding:14px 18px; border:0; cursor:pointer; font-weight:700; }
    .button.primary { background:#0f172a; color:#fff; }
    .button.secondary { background:rgba(255,255,255,0.1); color:#0f172a; border:1px solid #cbd5e1; }
    .button.danger { background:#fff1f2; color:#be123c; border:1px solid #fecdd3; }
    .button.ghost { background:#fff; color:#334155; border:1px solid #cbd5e1; }
    .button.full { width:100%; }
    .table-wrap { overflow-x:auto; margin-top:20px; }
    .table { width:100%; border-collapse:separate; border-spacing:0 12px; }
    .table th { text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:.18em; color:#94a3b8; padding:0 16px; }
    .table td { background:#f8fafc; padding:16px; }
    .table tr td:first-child { border-radius:18px 0 0 18px; }
    .table tr td:last-child { border-radius:0 18px 18px 0; }
    .row-title { display:flex; align-items:center; gap:12px; font-weight:700; }
    .list-card, .question-row { display:grid; gap:16px; border:1px solid #e2e8f0; background:#f8fafc; border-radius:24px; padding:16px; }
    .list-card { grid-template-columns: minmax(0, 1fr) auto; align-items:center; }
    .question-row { grid-template-columns: minmax(0, 1fr) 180px; }
    .student-card-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:20px; margin-top:20px; }
    .student-profile-card { border:1px solid #e2e8f0; background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); border-radius:26px; padding:20px; box-shadow: 0 14px 34px rgba(15, 23, 42, 0.05); }
    .student-profile-top { display:flex; gap:14px; align-items:center; }
    .student-photo-slot { width:58px; height:58px; border-radius:18px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #dbeafe, #cffafe); border:1px solid #bfdbfe; }
    .student-photo-initial { font-size:20px; font-weight:700; color:#0f172a; text-transform:uppercase; }
    .student-profile-copy { min-width:0; }
    .student-name { margin:0; font-size:18px; font-weight:700; color:#0f172a; }
    .student-email { margin:6px 0 0; font-size:14px; color:#64748b; word-break:break-word; }
    .student-meta-row { margin-top:18px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .student-photo-note { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#94a3b8; }
    .student-photo-image { width:100%; height:100%; object-fit:cover; border-radius:18px; }
    .student-parent-meta { margin-top:14px; display:grid; gap:6px; font-size:13px; color:#475569; }
    .student-card-actions { margin-top:18px; display:flex; gap:10px; align-items:center; }
    .student-card-actions form { margin:0; }
    .curriculum-form-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:18px; margin-top:20px; }
    .curriculum-form-card { border:1px solid #e2e8f0; background:#f8fafc; border-radius:24px; padding:18px; display:grid; gap:14px; }
    .curriculum-form-card h4 { margin:0; font-size:18px; color:#0f172a; }
    .checkbox-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
    .checkbox-card { display:flex; gap:10px; align-items:flex-start; padding:14px 16px; border:1px solid #cbd5e1; border-radius:18px; background:#fff; font-weight:600; color:#334155; }
    .checkbox-card input { margin-top:3px; }
    .curriculum-textarea { min-height:120px; resize:vertical; }
    .curriculum-tab-bar { display:flex; flex-wrap:wrap; gap:12px; margin-top:20px; }
    .curriculum-tab { display:inline-flex; align-items:center; justify-content:center; padding:12px 16px; border-radius:999px; border:1px solid #cbd5e1; background:#fff; font-weight:700; color:#334155; cursor:pointer; }
    .curriculum-tab:hover,
    .curriculum-tab.active { background:#eff6ff; border-color:#93c5fd; color:#1d4ed8; }
    .curriculum-panel { display:none; margin-top:22px; }
    .curriculum-panel.active { display:block; }
    .curriculum-section-card { scroll-margin-top:24px; }
    .curriculum-section-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .curriculum-tree { display:grid; gap:18px; margin-top:20px; }
    .tree-grade { border:1px solid #dbeafe; background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border-radius:24px; padding:18px; }
    .tree-branch { margin-top:14px; padding-left:20px; border-left:2px solid #dbeafe; display:grid; gap:12px; }
    .tree-collapse { display:grid; gap:12px; }
    .tree-collapse > summary { list-style:none; cursor:pointer; }
    .tree-collapse > summary::-webkit-details-marker { display:none; }
    .tree-collapse-icon { width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; border-radius:999px; border:1px solid #cbd5e1; background:#fff; color:#334155; font-size:14px; font-weight:700; flex-shrink:0; }
    .tree-collapse[open] > summary .tree-collapse-icon { background:#dbeafe; border-color:#93c5fd; color:#1d4ed8; }
    .tree-collapse > summary .tree-collapse-icon::before { content:'+'; }
    .tree-collapse[open] > summary .tree-collapse-icon::before { content:'-'; }
    .tree-node-shell { display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .tree-node-shell form { margin:0; }
    .tree-node-main { display:flex; align-items:center; gap:12px; min-width:0; }
    .tree-node-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .tree-action-link { display:inline-flex; align-items:center; justify-content:center; padding:8px 12px; border-radius:999px; border:1px solid #cbd5e1; background:#fff; color:#334155; font-size:12px; font-weight:700; }
    .tree-action-link.danger { color:#be123c; border-color:#fecdd3; background:#fff1f2; }
    .tree-level { border-radius:18px; padding:12px 14px; font-weight:700; }
    .tree-grade-label { background:#dbeafe; color:#1d4ed8; }
    .tree-lesson-label { background:#ecfeff; color:#0f766e; }
    .tree-sublesson-label { background:#f5f3ff; color:#6d28d9; }
    .tree-chapter-label { background:#fff7ed; color:#c2410c; }
    .tree-unit-label { background:#eef2ff; color:#4338ca; }
    .learning-list { margin:0; padding-left:22px; color:#334155; display:grid; gap:8px; }
    .tree-empty { border:1px dashed #cbd5e1; border-radius:18px; padding:12px 14px; color:#64748b; background:#ffffff; }
    .result-summary { background:#0f172a; color:#fff; border-radius:24px; padding:20px; margin-bottom:16px; }
    .question-card { border-radius:24px; padding:16px; border:1px solid; }
    .question-card-success { background:#ecfdf5; border-color:#a7f3d0; }
    .question-card-error { background:#fff1f2; border-color:#fecdd3; }
    .builder-placeholder,
    .leaderboard-shell { border:1px dashed #cbd5e1; background:#f8fafc; border-radius:24px; padding:24px; }
    .assignment-summary-card { margin-top:8px; }
    .assignment-summary-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:18px; margin-top:16px; }
    .assignment-summary-value { margin:8px 0 0; font-size:16px; font-weight:700; color:#0f172a; }
    .student-entry-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; margin-top:18px; }
    .student-entry-card { border:1px solid #dbeafe; background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border-radius:24px; padding:18px; }
    .student-entry-value { margin:12px 0 8px; font-size:34px; font-weight:700; color:#0f172a; }
    .list-card-active { border-color:#93c5fd; background:linear-gradient(180deg, #ffffff 0%, #eff6ff 100%); }
    .student-lesson-title { margin:10px 0 8px; font-size:28px; font-weight:700; color:#fff; }
    .lesson-track-card { border:1px solid #dbeafe; background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border-radius:24px; padding:18px; }
    .lesson-track-header { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; margin-bottom:14px; }
    .lesson-unit-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
    .lesson-unit-pill { border:1px solid #cbd5e1; background:#fff; border-radius:18px; padding:14px 16px; font-weight:600; color:#334155; }
    .lesson-card-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:16px; margin-top:20px; }
